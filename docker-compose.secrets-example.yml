# Example local override that mounts host secret files into /run/secrets
# Use the run-local.sh helper to auto-generate an override when files
# exist in ~/.hermes/secrets/ — this example shows the intended mapping.

version: "3.8"
services:
  hermes:
    volumes:
      - ${HOME}/.hermes/secrets/hermes_auth.json:/run/secrets/HERMES_AUTH_JSON_BOOTSTRAP:ro
      - ${HOME}/.hermes/secrets/api_server_key:/run/secrets/API_SERVER_KEY:ro
